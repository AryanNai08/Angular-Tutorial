<h1>signal-component</h1>
<h2>signal will reflect the value of count in ts file in real time</h2>
<h2>{{count()}}</h2>
<button (click)="count.set(count()+1)">Increment</button>
<button (click)="count.set(count()-1)">Decrement</button>
